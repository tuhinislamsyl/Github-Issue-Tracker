<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- tailwindcss + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class="bg-gray-50">

    <!-- ================= LOADING SPINNER ================= -->

    <div id="loading"
        class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center hidden z-[999]">

        <div class="bg-white p-8 rounded-xl shadow-xl flex flex-col items-center gap-4">

            <span class="loading loading-spinner loading-lg text-[#6000FF]"></span>

            <p class="text-gray-600 font-medium">Loading issues...</p>

        </div>

    </div>

    <!-- =================================================== -->


    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">

        <div class="max-w-[1440px] mx-auto px-4 sm:px-8 lg:px-12">

            <div class="flex justify-between items-center h-20">

                <!-- Logo -->

                <div class="flex items-center gap-3">
                    <img src="./assets/github-logo.png" class="w-10 h-10 object-contain">
                    <h1 class="text-xl font-bold text-slate-800">GitHub Issues Tracker</h1>
                </div>

                <!-- Search + Button -->

                <div class="flex items-center gap-4">

                    <!-- Search -->

                    <div class="relative hidden md:flex items-center">

                        <i class="fa-solid fa-magnifying-glass absolute left-3 text-gray-500 z-10"></i>

                        <input id="input-text" type="text" placeholder="Search issues..."
                            class="input input-bordered h-10 w-64 bg-slate-50 pl-10 focus:bg-white border-gray-300" />

                    </div>

                    <!-- New Issue Button -->

                    <button
                        class="btn bg-[#6000FF] hover:bg-[#5000D2] border-none text-white px-5 h-10 min-h-[40px] normal-case font-semibold">

                        <i class="fa-solid fa-plus mr-1"></i>
                        New Issue

                    </button>

                </div>

            </div>

        </div>

    </header>


    <!-- Toggle Buttons -->

    <main class="flex justify-center mt-16 mb-10 px-4">

        <div class="inline-flex bg-white border border-gray-200 rounded-xl p-4.5 shadow-sm w-full max-w-5xl gap-3">

            <button onclick="showAll(); btnController(this)" id="allBtn"
                class="px-12 py-2.5 rounded-lg bg-[#6000FF] text-white font-semibold text-sm">

                All

            </button>

            <button onclick="showOpen(); btnController(this)" id="openBtn"
                class="px-12 py-2.5 rounded-lg text-gray-500 hover:bg-gray-50 font-medium text-sm">

                Open

            </button>

            <button onclick="showClose(); btnController(this)" id="closed"
                class="px-12 py-2.5 rounded-lg text-gray-500 hover:bg-gray-50 font-medium text-sm">

                Closed

            </button>

        </div>

    </main>


    <section class="flex justify-center px-4 mb-10">

        <div class="w-full max-w-5xl">

            <!-- Header -->

            <div class="flex justify-between items-center bg-white border border-gray-200 rounded-t-xl p-4.5 shadow-sm">

                <div class="flex items-center gap-4">

                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-[#6000FF]">
                        <i class="fa-solid fa-circle-nodes text-xl"></i>
                    </div>

                    <div>

                        <h2 class="text-xl font-bold text-slate-800">
                            <span id="issue-counter">0</span> Issues
                        </h2>

                        <p class="text-sm text-gray-500">
                            Track and manage your project issues
                        </p>

                    </div>

                </div>

            </div>


            <!-- Cards Container -->

            <div id="cards"
                class="bg-gray-50 border-x border-b border-gray-200 p-6 rounded-b-xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

            </div>

        </div>

    </section>


    <!-- Modal -->

    <dialog id="issueDetailsModal" class="modal"></dialog>

    <script src="./script/main.js"></script>

</body>

</html>
